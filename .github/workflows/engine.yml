name: Signal Engine

on:
  schedule:
    # Every 5 minutes. GitHub Actions cron is best-effort, not exact —
    # runs can lag a few minutes during busy periods. That's fine here.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

permissions:
  contents: write   # needed to commit the updated signal history back

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal engine pass
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python runner.py

      - name: Commit updated signal history
        run: |
          git config user.name "signal-engine-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/signals.json
          git diff --staged --quiet || git commit -m "Update signal history [skip ci]"
          git push
